# Reverse proxy + TLS termination in front of the Flask app running on
# 127.0.0.1:8000. Replace `your-domain-or-ip` with your real domain.
#
# TLS certs: Let's Encrypt is domain-based, so this needs a real domain name
# pointed at the server (an A record), not just a bare IP. Once DNS is set up
# and this file is in place (without the ssl_certificate lines, or pointed at
# a temporary self-signed cert), run:
#
#   sudo certbot --nginx -d your-domain-or-ip
#
# certbot will rewrite this file in place to add the correct cert paths and
# the port-80-to-443 redirect below, if it isn't already present.

server {
    listen 80;
    server_name your-domain-or-ip;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain-or-ip;

    ssl_certificate     /etc/letsencrypt/live/your-domain-or-ip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain-or-ip/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
